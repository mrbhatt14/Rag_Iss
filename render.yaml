services:
  - type: web
    name: rag-iss
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --timeout 120
    envVars:
      - key: CHROMA_DIR
        value: /opt/render/project/src/chroma_db
      - key: GOOGLE_SHEET_CSV_URL
        value: https://docs.google.com/spreadsheets/d/1nwSzIkL-8Dmatx-dIS5zETsgZ4GPzaOJXguVDRqNbgQ/edit?usp=sharing
      - key: ANONYMIZED_TELEMETRY
        value: "False"
      - key: PYTHON_VERSION
        value: 3.11.9
